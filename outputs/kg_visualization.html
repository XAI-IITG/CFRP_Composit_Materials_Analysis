<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2a2a4a;
    z-index: 10;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, #4FC3F7, #CE93D8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .stats {
    font-size: 13px;
    color: #888;
  }
  .controls {
    background: #1a1a2e;
    padding: 10px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid #2a2a4a;
  }
  .controls button {
    padding: 6px 16px;
    border: 1px solid #4FC3F7;
    background: transparent;
    color: #4FC3F7;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .controls button:hover, .controls button.active {
    background: #4FC3F7;
    color: #0f0f1a;
  }
  .legend {
    padding: 8px 24px;
    background: #151528;
    font-size: 12px;
    border-bottom: 1px solid #2a2a4a;
    overflow-x: auto;
    white-space: nowrap;
  }
  #graph {
    width: 100%;
    height: calc(100vh - 120px);
  }
  .info-panel {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(26, 26, 46, 0.95);
    border: 1px solid #4FC3F7;
    border-radius: 10px;
    padding: 16px;
    max-width: 350px;
    font-size: 13px;
    display: none;
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  .info-panel h3 {
    color: #4FC3F7;
    margin-bottom: 8px;
    font-size: 15px;
  }
  .info-panel p {
    color: #bbb;
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .info-panel .close {
    position: absolute;
    top: 8px;
    right: 12px;
    cursor: pointer;
    color: #666;
    font-size: 16px;
  }
</style>
</head>

: "#F48FB1", "font": {"size": 9, "color": "#666666"}, "arrows": "to"}]},
};

let network = null;
let physicsEnabled = true;
let currentView = 'schema';

function initNetwork(nodesData, edgesData) {
  const container = document.getElementById('graph');
  const data = {
    nodes: new vis.DataSet(nodesData),
    edges: new vis.DataSet(edgesData)
  };
  const options = {
    physics: {
      enabled: physicsEnabled,
      barnesHut: {
        gravitationalConstant: -3000,
        centralGravity: 0.3,
        springLength: 120,
        springConstant: 0.04,
        damping: 0.09
      },
      stabilization: { iterations: 150 }
    },
    interaction: {
      hover: true,
      tooltipDelay: 100,
      zoomView: true,
      dragView: true,
    },
    nodes: {
      font: { color: '#e0e0e0', size: 12 },
      borderWidth: 2,
      shadow: true,
    },
    edges: {
      smooth: { type: 'continuous' },
      font: { size: 9, color: '#666', strokeWidth: 0 }
    }
  };
  if (network) network.destroy();
  network = new vis.Network(container, data, options);
  
  document.getElementById('stats').textContent = 
    nodesData.length + ' nodes · ' + edgesData.length + ' edges';

  // Click handler
  network.on('click', function(params) {
    const panel = document.getElementById('info-panel');
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      const node = nodesData.find(n => n.id === nodeId);
      if (node) {
        document.getElementById('info-title').textContent = node.label;
        document.getElementById('info-body').textContent = node.title || '';
        panel.style.display = 'block';
        panel.style.borderColor = node.color;
      }
    } else {
      panel.style.display = 'none';
    }
  });
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const btnId = 'btn-' + view.replace('specimen_', '').toLowerCase();
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.add('active');

  if (viewData[view]) {
    initNetwork(viewData[view].nodes, viewData[view].edges);
  } else {
    // For dynamically loaded views, we embed all data at generation time
    initNetwork(viewData.schema.nodes, viewData.schema.edges);
  }
}

function togglePhysics() {
  physicsEnabled = !physicsEnabled;
  if (network) {
    network.setOptions({ physics: { enabled: physicsEnabled } });
  }
}

// Initial render
initNetwork(viewData.schema.nodes, viewData.schema.edges);
</script>
